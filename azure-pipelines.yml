trigger:
  - main

pr:
  - main

pool:
  vmImage: ubuntu-latest

variables:
  NodeVersion: '20.x'
  PMS_BASE_URL: 'https://pms.ethnomet.com/'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '$(NodeVersion)'
    displayName: 'Use Node.js $(NodeVersion)'

  - script: npm install
    displayName: 'Install npm packages'

  - script: npx playwright install --with-deps chromium
    displayName: 'Install Playwright browsers'

  - script: npm run test:ci
    displayName: 'Run PMS regression flow'
    env:
      CI: 'true'
      PMS_BASE_URL: '$(PMS_BASE_URL)'
      PMS_USERNAME: '$(PMS_USERNAME)'
      PMS_PASSWORD: '$(PMS_PASSWORD)'

  - task: PublishTestResults@2
    displayName: 'Publish test results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'test-results/junit.xml'
      failTaskOnFailedTests: true
      testRunTitle: 'PMS Playwright Regression'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish Playwright report'
    condition: succeededOrFailed()
    inputs:
      targetPath: 'playwright-report'
      artifact: 'playwright-report'
      publishLocation: 'pipeline'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish Playwright raw results'
    condition: succeededOrFailed()
    inputs:
      targetPath: 'test-results'
      artifact: 'test-results'
      publishLocation: 'pipeline'
